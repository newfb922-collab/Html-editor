<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HTML View - Rehan Pro</title>
    <style>
        :root {
            --primary-blue: #00d2ff;
            --secondary-blue: #3a7bd5;
            --card-bg: rgba(30, 41, 59, 0.95);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0; padding: 10px;
            font-family: 'Segoe UI', sans-serif;
            background: #0f172a;
            color: white; overflow-x: hidden;
        }

        .container { width: 100%; max-width: 100%; margin: 0 auto; }

        h1 {
            text-align: center;
            background: linear-gradient(to right, var(--primary-blue), #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 1.5rem; margin: 15px 0;
        }

        /* --- Input Section --- */
        .editor-tools {
            display: flex; flex-direction: column; gap: 12px;
            background: var(--card-bg); padding: 15px;
            border-radius: 15px; border: 1px solid var(--primary-blue);
            margin-bottom: 15px;
        }

        .input-group { display: flex; flex-direction: column; gap: 5px; width: 100%; }

        .input-row { 
            display: flex; 
            width: 100%; 
            gap: 8px; 
            align-items: center;
        }

        input {
            flex: 1; min-width: 0;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid #334155; border-radius: 20px;
            padding: 10px 15px; color: white; outline: none; font-size: 14px;
        }

        .btn-small {
            flex-shrink: 0; background: var(--secondary-blue); color: white;
            border: none; border-radius: 20px; padding: 10px 18px;
            font-weight: bold; cursor: pointer; font-size: 12px;
            white-space: nowrap;
        }

        /* Sequence Buttons */
        .action-btns {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 5px;
        }

        .btn-update {
            width: 100%; background: #10b981; color: white; border: none;
            padding: 12px; border-radius: 20px; font-weight: bold;
            cursor: pointer; text-transform: uppercase;
        }

        .btn-download {
            width: 100%; background: #6366f1; color: white; border: none;
            padding: 12px; border-radius: 20px; font-weight: bold;
            cursor: pointer; text-transform: uppercase;
        }

        /* Textarea Box */
        .box {
            background: var(--card-bg); border: 2px solid var(--primary-blue);
            border-radius: 12px; padding: 10px; margin-bottom: 15px; width: 100%;
        }

        textarea {
            width: 100%; height: 180px; background: transparent;
            border: none; color: #e2e8f0; font-family: 'Consolas', monospace;
            font-size: 14px; outline: none; resize: none;
        }

        .btn-run {
            width: 100%; background: linear-gradient(45deg, var(--secondary-blue), var(--primary-blue));
            color: white; border: none; padding: 14px; font-size: 15px;
            font-weight: bold; border-radius: 40px; cursor: pointer;
            text-transform: uppercase; margin-bottom: 15px;
        }

        #output-frame {
            width: 100%; height: 300px; background: white;
            border-radius: 8px; border: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>HTML VIEW <span style="font-weight: 100;">BY REHAN</span></h1>

        <div class="editor-tools">
            <div class="input-group">
                <span style="font-size:12px; color:var(--primary-blue); font-weight:bold; margin-left:5px;">Find word</span>
                <div class="input-row">
                    <input type="text" id="find-word" placeholder="Word...">
                    <button class="btn-small" onclick="findInCode()">FIND</button>
                </div>
            </div>

            <div class="input-group">
                <span style="font-size:12px; color:var(--primary-blue); font-weight:bold; margin-left:5px;">Replacement word</span>
                <input type="text" id="replace-word" placeholder="New word...">
            </div>

            <div class="action-btns">
                <button class="btn-update" onclick="replaceCode()">Update Code</button>
                <button class="btn-download" onclick="downloadCode()">Download index.html</button>
            </div>
        </div>

        <div class="box">
            <textarea id="html-code" placeholder="Paste code here..."></textarea>
        </div>

        <button class="btn-run" onclick="runCode()">Run Website</button>

        <div class="box" style="padding: 5px; background: #fff;">
            <iframe id="output-frame"></iframe>
        </div>
    </div>

    <script>
        function runCode() {
            const htmlCode = document.getElementById('html-code').value;
            const frame = document.getElementById('output-frame').contentWindow.document;
            frame.open(); frame.write(htmlCode); frame.close();
        }

        function findInCode() {
            const findText = document.getElementById('find-word').value;
            const textArea = document.getElementById('html-code');
            if (!findText) return alert("Pehle word likho!");
            
            const index = textArea.value.indexOf(findText);
            if (index !== -1) {
                textArea.focus();
                textArea.setSelectionRange(index, index + findText.length);
                const fullLine = textArea.value.substr(0, index).split("\n").length;
                textArea.scrollTop = (fullLine - 1) * 20;
            } else {
                alert("Nahi mila!");
            }
        }

        function replaceCode() {
            const findText = document.getElementById('find-word').value;
            const replaceText = document.getElementById('replace-word').value;
            const textArea = document.getElementById('html-code');
            if (!findText) return alert("Find word box khali hai!");
            textArea.value = textArea.value.split(findText).join(replaceText);
            runCode();
            alert("Code Updated!");
        }

        function downloadCode() {
            const htmlCode = document.getElementById('html-code').value;
            if (!htmlCode) return alert("Code to likho pehle!");
            
            const blob = new Blob([htmlCode], { type: "text/html" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = "index.html";
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
