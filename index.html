<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML View - Premium Previewer</title>
    <style>
        :root {
            --primary-blue: #00d2ff;
            --secondary-blue: #3a7bd5;
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --border-glow: 0 0 15px rgba(0, 210, 255, 0.4);
        }

        body {
            margin: 0;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: white;
            min-height: 100vh;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            background: linear-gradient(to right, var(--primary-blue), #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2.5rem;
            margin-bottom: 30px;
        }

        /* Editor Box */
        .box {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 2px solid var(--primary-blue);
            border-radius: 12px;
            padding: 20px;
            box-shadow: var(--border-glow);
            margin-bottom: 25px;
            transition: transform 0.3s ease;
        }

        textarea {
            width: 100%;
            height: 250px;
            background: transparent;
            border: none;
            color: #e2e8f0;
            font-family: 'Consolas', monospace;
            font-size: 16px;
            outline: none;
            resize: vertical;
        }

        /* Premium Run Button */
        .btn-container {
            display: flex;
            justify-content: center;
            margin-bottom: 25px;
        }

        button {
            background: linear-gradient(45deg, var(--secondary-blue), var(--primary-blue));
            color: white;
            border: none;
            padding: 12px 40px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 4px 15px rgba(0, 210, 255, 0.3);
            transition: all 0.3s ease;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 210, 255, 0.5);
        }

        button:active {
            transform: translateY(1px);
        }

        /* Output Box */
        .output-header {
            margin-bottom: 10px;
            font-size: 14px;
            color: var(--primary-blue);
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #output-frame {
            width: 100%;
            height: 400px;
            background: white; /* Website preview hamesha safed background pe achi lagti hai */
            border-radius: 8px;
            border: none;
        }

        .label {
            margin-bottom: 10px;
            display: block;
            font-weight: 600;
            color: var(--primary-blue);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>HTML VIEW <span style="font-weight: 100;">BY REHAN</span></h1>

        <div class="box">
            <span class="label">Paste Your HTML Code Here:</span>
            <textarea id="html-code" placeholder="<html>
<body>
  <h1 style='color:blue'>Hello World</h1>
</body>
</html>"></textarea>
        </div>

        <div class="btn-container">
            <button onclick="runCode()">Run Website</button>
        </div>

        <div class="output-header">
            <span>● Live Preview</span>
        </div>
        <div class="box" style="padding: 10px; background: rgba(255,255,255,0.1);">
            <iframe id="output-frame"></iframe>
        </div>
    </div>

    <script>
        function runCode() {
            const htmlCode = document.getElementById('html-code').value;
            const frame = document.getElementById('output-frame').contentWindow.document;

            frame.open();
            frame.write(htmlCode);
            frame.close();
        }
    </script>
</body>
</html>
